<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Green gradient -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- V letter -->
  <path d="M15 85 L35 25 L50 60 L65 25 L85 85" 
        fill="none" 
        stroke="url(#logoGradient)" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- Index arrow -->
  <path d="M70 20 L85 20 L85 35" 
        fill="none" 
        stroke="#22c55e" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  <path d="M78 28 L85 35 L92 28" 
        fill="none" 
        stroke="#22c55e" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Index lines -->
  <line x1="35" y1="80" x2="45" y2="80" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="30" y1="72" x2="42" y2="72" stroke="#22c55e" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>