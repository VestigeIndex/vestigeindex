name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_CRYPTOCOMPARE_API_KEY: ${{ secrets.VITE_CRYPTOCOMPARE_API_KEY }}
          VITE_EVM_FEE_ADDRESS: ${{ secrets.VITE_EVM_FEE_ADDRESS }}
          VITE_SOL_FEE_ADDRESS: ${{ secrets.VITE_SOL_FEE_ADDRESS }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=vestige-index
        env:
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_CRYPTOCOMPARE_API_KEY: ${{ secrets.VITE_CRYPTOCOMPARE_API_KEY }}
          VITE_EVM_FEE_ADDRESS: ${{ secrets.VITE_EVM_FEE_ADDRESS }}
          VITE_SOL_FEE_ADDRESS: ${{ secrets.VITE_SOL_FEE_ADDRESS }}
